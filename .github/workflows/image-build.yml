name: Build and Publish vkQuake Server Container

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag to build (e.g. 1.33.1)'
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mmbesar/quake-container

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.image_tag || 'upstream' }}
          path: upstream-src

      - name: Prepare build context
        run: |
          cp -r upstream-src/* .
          ls -la Dockerfile entrypoint.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge and push multi-arch manifest
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download AMD64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests

      - name: Download ARM64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-arm64
          path: /tmp/digests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate tags
        id: tags
        run: |
          TAG="${{ github.event.inputs.image_tag }}"

          # Always include latest
          TAGS="${{ env.IMAGE_NAME }}:latest"

          # If we have a semver tag, also add version and minor tags
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            MINOR=$(echo "$TAG" | cut -d. -f1,2)
            TAGS="$TAGS,${{ env.IMAGE_NAME }}:${TAG},${{ env.IMAGE_NAME }}:${MINOR}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Generated tags: $TAGS"

      - name: Create and push multi-arch manifest
        run: |
          # Build the digest arguments
          DIGESTS=$(ls /tmp/digests | xargs -I{} echo "${{ env.IMAGE_NAME }}@sha256:{}")

          # Create comma-separated tag arguments
          TAG_ARGS=$(echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | xargs -I{} echo "--tag {}" | tr '\n' ' ')

          docker buildx imagetools create $TAG_ARGS $DIGESTS

      - name: Inspect final manifest
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest
