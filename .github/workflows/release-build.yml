name: Build vkQuake with Fixed Port

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (leave empty for latest)'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            appimage_suffix: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            appimage_suffix: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: upstream
          fetch-depth: 0

      - name: Set git identity to repo owner
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"

      - name: Get version info
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(git tag --sort=-version:refname | head -n1)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          BASE_VERSION=$(grep -oP "^#define\s*VKQUAKE_VERSION\s*\K[0-9.]*" Quake/quakever.h)
          PATCH_VERSION=$(grep -oP "^#define\s*VKQUAKE_VER_PATCH\s*\K[0-9.]*" Quake/quakever.h)
          SUFFIX=$(grep -oP "^#define\s*VKQUAKE_VER_SUFFIX\s*\"\K([^\"]*)" Quake/quakever.h || echo "")
          VERSION="${BASE_VERSION}.${PATCH_VERSION}${SUFFIX}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Building tag: $TAG"
          echo "Version: $VERSION"
          echo "Arch: ${{ matrix.arch }}"

      - name: Apply port fix
        run: |
          # Surgical fix: only the control socket init call gets port 57613
          # This avoids the double-bind crash when connecting to a server
          # The control socket is opened once at startup for LAN discovery
          # All other sockets (connection, listen) remain on random/configured ports
          sed -i 's/net_controlsocket4 = UDP4_OpenSocket (0)/net_controlsocket4 = UDP4_OpenSocket (57613)/' Quake/net_udp.c

          echo "=== Port fix applied ==="
          grep -A1 -B1 "57613" Quake/net_udp.c

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: Packaging/AppImage/docker
          platforms: linux/${{ matrix.arch }}
          tags: build-vkquake
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }}

      - name: Build vkQuake using upstream system
        run: |
          chmod +x Packaging/AppImage/run-in-docker.sh

          docker run --rm --privileged \
            -e VERSION=${{ steps.get_version.outputs.version }}-port-fixed \
            -v "$PWD:/usr/src/vkQuake" \
            build-vkquake /usr/src/vkQuake/Packaging/AppImage/run-in-docker.sh

      - name: Prepare release files
        run: |
          cd Packaging/AppImage

          TAG="${{ steps.get_version.outputs.tag }}"
          VERSION="${{ steps.get_version.outputs.version }}-port-fixed"
          ARCH="${{ matrix.arch }}"
          APPIMAGE_SUFFIX="${{ matrix.appimage_suffix }}"

          # Upstream produces:
          # vkQuake-{VERSION}-{appimage_suffix}.AppImage (capital Q)
          # vkquake-{VERSION}_linux64.tar.gz  (amd64 only — upstream uses this naming)
          APPIMAGE=$(ls vkQuake-${VERSION}-${APPIMAGE_SUFFIX}.AppImage)
          mv "$APPIMAGE" "vkquake-${TAG}-linux-${ARCH}.AppImage"

          # tar.gz only produced by upstream for amd64
          if [ "$ARCH" = "amd64" ]; then
            ARCHIVE=$(ls vkquake-${VERSION}_linux64.tar.gz)
            mv "$ARCHIVE" "vkquake-${TAG}-linux-${ARCH}.tar.gz"
          fi

          echo "=== Generated files ==="
          ls -la vkquake-${TAG}-*

          mv vkquake-${TAG}-* ../../

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.arch }}
          path: |
            vkquake-*-linux-${{ matrix.arch }}.AppImage
            vkquake-*-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: warn
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: upstream
          fetch-depth: 0

      - name: Set git identity to repo owner
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"

      - name: Get tag
        id: get_tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(git tag --sort=-version:refname | head -n1)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download amd64 artifact
        uses: actions/download-artifact@v7
        with:
          name: release-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: release-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: vkQuake ${{ steps.get_tag.outputs.tag }} (Fixed Port)
          body: |
            vkQuake ${{ steps.get_tag.outputs.tag }} with fixed client port 57613

            **Changes:**
            - Client control socket always uses UDP port 57613 instead of a random port
            - Easier firewall management: just allow UDP 57613 outbound on your client
            - Built natively for both AMD64 and ARM64 (no emulation)

            **Files:**
            - `vkquake-${{ steps.get_tag.outputs.tag }}-linux-amd64.AppImage` - AMD64 AppImage
            - `vkquake-${{ steps.get_tag.outputs.tag }}-linux-amd64.tar.gz` - AMD64 archive
            - `vkquake-${{ steps.get_tag.outputs.tag }}-linux-arm64.AppImage` - ARM64 AppImage

            **Installation:**
            - AppImage: Download, make executable (`chmod +x`), and run
            - tar.gz: Extract and run the `vkquake` binary

            **Firewall rule (client machine):**
            ```
            allow udp out port 57613
            ```
          files: |
            vkquake-${{ steps.get_tag.outputs.tag }}-linux-amd64.AppImage
            vkquake-${{ steps.get_tag.outputs.tag }}-linux-amd64.tar.gz
            vkquake-${{ steps.get_tag.outputs.tag }}-linux-arm64.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
