name: Sync Upstream Source

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-upstream:
    name: Sync upstream to local upstream branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote and fetch
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git remote add upstream https://github.com/Novum/vkQuake.git
          git fetch upstream --tags --force

      - name: Detect new tags
        id: detect_tags
        run: |
          # Get all upstream tags
          UPSTREAM_TAGS=$(git tag -l | sort -V)

          # Get tags already pushed to origin
          ORIGIN_TAGS=$(git ls-remote --tags origin | grep -v '{}' | awk -F'/' '{print $3}' | sort -V)

          # Find tags in upstream that are not in origin
          NEW_TAGS=$(comm -23 <(echo "$UPSTREAM_TAGS") <(echo "$ORIGIN_TAGS") | tail -n1)

          if [ -z "$NEW_TAGS" ]; then
            echo "No new tags found. Nothing to do."
            echo "new_tag=" >> $GITHUB_OUTPUT
          else
            echo "New tag found: $NEW_TAGS"
            echo "new_tag=$NEW_TAGS" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream branch
        if: steps.detect_tags.outputs.new_tag != ''
        run: |
          # Save your workflows
          mkdir -p /tmp/my-workflows
          cp -r .github/workflows/* /tmp/my-workflows/

          git checkout -B upstream upstream/master
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/my-workflows/* .github/workflows/

          git add .
          git commit -m "Sync upstream @ ${{ steps.detect_tags.outputs.new_tag }}" || true
          git push origin upstream --force

      - name: Push new tag
        if: steps.detect_tags.outputs.new_tag != ''
        run: |
          TAG="${{ steps.detect_tags.outputs.new_tag }}"

          # Save your workflows
          mkdir -p /tmp/my-workflows
          cp -r /tmp/my-workflows/* /tmp/my-workflows/ 2>/dev/null || true

          git checkout -B temp-$TAG $TAG
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/my-workflows/* .github/workflows/

          git add .
          git commit -m "Remove upstream workflows from $TAG" || true
          git tag -f $TAG
          git checkout upstream
          git branch -D temp-$TAG

          git push origin $TAG --force

      - name: Trigger image build
        if: steps.detect_tags.outputs.new_tag != ''
        run: |
          gh workflow run image-build.yml \
            --field image_tag=${{ steps.detect_tags.outputs.new_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
